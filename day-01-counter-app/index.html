<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App</title>
    <link href="src/output.css" rel="stylesheet">
    <script src="counter.js" defer></script>
</head>

<body class="flex min-h-screen items-center justify-center p-4 bg-gray-100">
    <!-- COUNTER CONTAINER -->
    <div class="w-full max-w-sm rounded-2xl shadow-xl p-6 md:p-8 bg-white flex flex-col gap-6">

        <!-- COUNTER HEADER -->
        <h1 class="text-center font-extrabold text-2xl text-gray-800 tracking-wide uppercase">
            Counter App
        </h1>

        <!-- DISPLAY AREA -->
        <div class="flex items-center justify-center py-6 bg-gray-50 rounded-xl border border-gray-100">
            <span id="counter" class="text-6xl font-black text-gray-900 select-none">0</span>
        </div>

        <!-- INCREASE, DECREASE AND RESET BUTTONS -->
        <div class="flex flex-col gap-3">

            <div class="grid grid-cols-2 gap-3">
                <button type="button" id="decreaseBtn" class="py-3 bg-red-500 hover:bg-red-600 active:scale-95 text-white font-bold text-xl rounded-xl transition-all shadow-sm">
                    -
                </button>
                <button type="button" id="increaseBtn" class="py-3 bg-green-500 hover:bg-green-600 active:scale-95 text-white font-bold text-xl rounded-xl transition-all shadow-sm">
                    +
                </button>
            </div>
            
            <!-- System Reset -->
            <button type="button" id="resetBtn" class="w-full py-2.5 bg-gray-800 hover:bg-gray-900 active:scale-[0.98] text-white font-medium text-sm tracking-wider rounded-xl transition-all uppercase">
                Reset
            </button>
        </div>
    </div> <!-- Correctly closing container inside body -->
</body>

</html>
